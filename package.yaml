name:                reliable-download
version:             1.1.3.0
synopsis:            provide reliable download service via HTTP
description:         reliable-download web application and cli tool
homepage:            "https://gitlab.emacsos.com/sylecn/reliable-download"
bug-reports:         "https://gitlab.emacsos.com/sylecn/reliable-download/issues"
license:             GPL-3
author:              Yuanle Song
maintainer:          sylecn@gmail.com
copyright:           "Copyright: (c) 2018, 2019, 2022 Yuanle Song"
category:            Utilities
extra-source-files:
- README.md

ghc-options:
  - -Wall
  - -Werror
  - -O2
  # - -fprof-auto

default-extensions:
  - OverloadedStrings
  - ScopedTypeVariables

dependencies:
  - base >= 4.7 && < 5
  # project specific
  - scotty
  - wai
  - warp
  - wai-middleware-static
  - hedis
  - cryptohash
  - byteable
  - network
  - ansi-wl-pprint
  # file system
  - directory
  - filepath
  - unix
  # data types
  - bytestring
  - text
  - unordered-containers
  - aeson
  - extra
  # general utils
  - transformers
  - optparse-applicative
  - formatting
  - tinylog
  - errors

library:
  source-dirs: lib

executables:
  rd-api:
    source-dirs:
    - api
    - api/lib
    - cli-version
    main: Main.hs
    dependencies:
    - reliable-download
    ghc-options:
    - -threaded
    - -O2
  rd:
    source-dirs:
    - client
    - cli-version
    main: Main.hs
    dependencies:
    - reliable-download    # I only need the Type module
    - http-conduit
    - http-client
    - http-types
    - retry
    - socket
    - io-thread-pool
    ghc-options:
    - -threaded
    - -O2
  maybet:
    source-dirs: misc/maybet
    main: Main.hs
    dependencies:
    - reliable-download
    ghc-options:
    - -threaded
  logtest:
    source-dirs: misc/logtest
    main: Main.hs
    ghc-options:
    - -threaded

tests:
  all-tests:
    main: Main.hs
    source-dirs:
    - test
    - api/lib
    dependencies:
    - reliable-download
    - hspec
    - hspec-wai
    - http-types
    - wai-extra
    - unordered-containers
    - binary
